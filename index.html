<!DOCTYPE html>
<html>

<head>
    <title>Happy Birthday</title>

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:'Segoe UI',sans-serif;

            background:linear-gradient(270deg,#ff758c,#ff7eb3,#89f7fe,#66a6ff);
            background-size:800% 800%;
            animation:bgmove 12s ease infinite;
            overflow:hidden;
        }

        /* Animated Background */
        @keyframes bgmove{
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        /* Floating Balloons */
        .balloon{
            position:absolute;
            bottom:-100px;
            font-size:40px;
            animation:float 10s linear infinite;
        }

        @keyframes float{
            0%{transform:translateY(0);}
            100%{transform:translateY(-120vh);}
        }

        /* Birthday Card */
        .card{
            background:rgba(255,255,255,0.9);
            padding:50px;
            border-radius:25px;
            text-align:center;
            backdrop-filter:blur(10px);

            box-shadow:0 20px 40px rgba(0,0,0,0.3);
            transition:0.4s;
        }

        .card:hover{
            transform:scale(1.05);
        }

        h1{
            font-size:55px;
            color:#ff3b6b;
            margin-bottom:10px;

            animation:glow 1.5s infinite alternate;
        }

        @keyframes glow{
            from{text-shadow:0 0 10px #ff9db5;}
            to{text-shadow:0 0 30px #ff0055;}
        }

        .cake{
            font-size:80px;
            margin:20px 0;
            animation:bounce 2s infinite;
        }

        @keyframes bounce{
            0%,100%{transform:translateY(0);}
            50%{transform:translateY(-10px);}
        }

        p{
            font-size:22px;
            color:#444;
            margin-bottom:25px;
        }

        button{
            padding:12px 35px;
            border:none;
            border-radius:30px;
            background:linear-gradient(45deg,#ff4d6d,#ff1e4d);
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            transform:scale(1.1);
            box-shadow:0 10px 20px rgba(0,0,0,0.3);
        }

    </style>
</head>

<body>

    <!-- Floating Balloons -->
    <div class="balloon" style="left:10%">🎈</div>
    <div class="balloon" style="left:25%; animation-delay:2s;">🎈</div>
    <div class="balloon" style="left:40%; animation-delay:4s;">🎈</div>
    <div class="balloon" style="left:60%; animation-delay:1s;">🎈</div>
    <div class="balloon" style="left:75%; animation-delay:3s;">🎈</div>
    <div class="balloon" style="left:90%; animation-delay:5s;">🎈</div>

    <!-- Birthday Card -->
    <div class="card">

        <h1>🎉 Happy Birthday 🎉</h1>

        <div class="cake">
            🎂🎁✨
        </div>

        <p>
            Wishing you a day filled with love, laughter, and happiness 💖
        </p>

        <button onclick="window.location.href='WISHES.html'">
            Open Birthday Surprise 🎁
        </button>

    </div>

</body>

</html>
