<!DOCTYPE html>
<html>

<head>
    <title>Birthday Wishes</title>

    <style>

        body{
            margin:0;
            font-family:'Segoe UI',sans-serif;
            text-align:center;
            height:100vh;
            overflow:hidden;

            background:linear-gradient(270deg,#ff9a9e,#fad0c4,#fad0c4,#ffdde1);
            background-size:600% 600%;
            animation:bgmove 10s ease infinite;
        }

        /* Animated Background */

        @keyframes bgmove{
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        h1{
            margin-top:40px;
            font-size:55px;
            color:#ff2e63;
            animation:glow 1.5s infinite alternate;
        }

        /* Glow animation */

        @keyframes glow{
            from{ text-shadow:0 0 10px pink; }
            to{ text-shadow:0 0 30px red; }
        }

        p{
            font-size:22px;
            width:65%;
            margin:auto;
            margin-top:20px;
            color:#333;
            line-height:1.6;
        }

        /* Photo Section */

        .photo{
            margin-top:40px;
        }

        .photo img{
            max-width:320px;
            height:auto;
            border-radius:20px;
            border:8px solid white;
            box-shadow:0 15px 40px rgba(0,0,0,0.35);
            transition:transform 0.4s;
        }

        .photo img:hover{
            transform:scale(1.08);
        }

        /* Floating Hearts */

        .heart{
            position:absolute;
            bottom:-50px;
            font-size:30px;
            animation:float 8s linear infinite;
        }

        @keyframes float{
            0%{transform:translateY(0);}
            100%{transform:translateY(-120vh);}
        }

        button{
            margin-top:35px;
            padding:14px 35px;
            font-size:18px;
            border:none;
            border-radius:30px;
            background:linear-gradient(45deg,#ff2e63,#ff6a88);
            color:white;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            transform:scale(1.1);
            box-shadow:0 10px 20px rgba(0,0,0,0.3);
        }

    </style>

</head>

<body>

    <!-- Floating Hearts -->

    <div class="heart" style="left:10%">💖</div>
    <div class="heart" style="left:25%; animation-delay:2s;">💖</div>
    <div class="heart" style="left:40%; animation-delay:4s;">💖</div>
    <div class="heart" style="left:60%; animation-delay:1s;">💖</div>
    <div class="heart" style="left:75%; animation-delay:3s;">💖</div>
    <div class="heart" style="left:90%; animation-delay:5s;">💖</div>


    <h1>🎉 Happy Birthday Sister 🎉</h1>

    <p id="message"></p>


    <!-- Photo Frame -->

    <div class="photo">
        <img src="tst.jpeg" alt="My Sister">
    </div>


    <button onclick="showWish()">
        Click for Special Wish 🎁
    </button>


    <script>

        /* Typewriter Message */

        let text="Wishing you a day filled with love, laughter, and unforgettable moments. May this year bring you endless happiness, success, and beautiful memories. Thank you for being the most amazing sister in the world ❤️";

        let i=0;

        function typeWriter(){

            if(i<text.length){

                document.getElementById("message").innerHTML += text.charAt(i);

                i++;

                setTimeout(typeWriter,40);
            }
        }

        typeWriter();


        function showWish(){

            alert("You are not just my sister, you are my best friend. Happy Birthday! 🎂💖");

        }

    </script>

</body>

</html>
